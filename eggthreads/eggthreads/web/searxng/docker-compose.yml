version: "3.8"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: egg-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
      - INSTANCE_NAME=egg-searxng
      - UWSGI_WORKERS=2
      - UWSGI_THREADS=4
